name: flutter_telegram_auth
description: "A Flutter plugin for integrating Telegram Login across Android, iOS, and Web. Uses native SDKs for mobile without webviews."
version: 0.1.0
homepage: "https://github.com/nodirbeksoliyev0811/flutter_telegram_auth"
repository: "https://github.com/nodirbeksoliyev0811/flutter_telegram_auth"

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_telegram_auth
        pluginClass: FlutterTelegramAuthPlugin
      ios:
        pluginClass: FlutterTelegramAuthPlugin
      web:
        pluginClass: FlutterTelegramAuthWeb
        fileName: flutter_telegram_auth_web.dart
